# Enable display support so the nice!view is actually driven.
CONFIG_ZMK_DISPLAY=y

# Enable mouse/pointing HID so the MOUSE layer's &mmv/&mkp/&msc behaviors work.
CONFIG_ZMK_POINTING=y

# Disable display blanking on idle. Shield enables SSD1306 by default which
# flips ZMK_DISPLAY_BLANK_ON_IDLE to y, blanking the nice!view after a few
# seconds even though we don't want OLED-style power saving here.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Invert widget colors to compensate for display showing inverted (mostly black
# with white flecks pattern means widget background+text are reversed).
CONFIG_NICE_VIEW_WIDGET_INVERTED=y

# Per-key SK6812 chain. Driven by our own rgb_indicator module (Zephyr led_strip
# API) for per-key, layer-based indication, so ZMK's built-in underglow driver
# is OFF to avoid two writers to the same strip. CONFIG_LED_STRIP brings up the
# ws2812-spi driver (the led_strip node lives on spi3 / P0.06 in the shield).
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_LED_STRIP=y
CONFIG_RGB_INDICATOR=y
# Chain mapping captured -> real layer-indicator mode (mapper off).
CONFIG_RGB_INDICATOR_MAP_MODE=n

# Disabled now that firmware-side is verified.
# CONFIG_LOG_DEFAULT_LEVEL=3
# CONFIG_DISPLAY_LOG_LEVEL_DBG=y

# Debug: enable display driver debug logs (paired with zmk-usb-logging snippet via build.sh).
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_DISPLAY_LOG_LEVEL_DBG=y

# Encoders disabled (Aurora Corne encoder sockets are optional).
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB underglow disabled by default.
# CONFIG_ZMK_RGB_UNDERGLOW=y
